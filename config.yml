# config.yml
app:
  title: "KIT719 Project 2 — RAG + Adzuna Tool"

rag:
  pdf_path: "data/sources/OSCA_27_ICT.pdf"
  db_dir: "data/vector_db"
  collection: "osca_ict"
  embedding_model: "all-MiniLM-L6-v2"
  top_k: 3          # number of chunks returned per query
  use_pymupdf: true      
  chunk_size: 700        
  chunk_overlap: 120

tools:
  salary:
    default_location: "Australia"
    country: "au"
    pages: 2                 # how many pages to fetch from Adzuna
    results_per_page: 50
    category: "it-jobs"      # Adzuna category filter
    max_days_old: 90
    client_filter_min: 30000 # keep salaries within [min, max]
    client_filter_max: 300000

router:
  use_zero_shot: true
  provider: google  

llm:
  use_for_answer: false       
  provider: google
  model: gemini-2.5-flash
  temperature: 0